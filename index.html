<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nojdar Farsat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0A0F1E;
      --slate:  #1C2541;
      --cyan:   #00D4FF;
      --blue:   #3b82f6;
      --white:  #F0F4FF;
      --muted:  #8892A4;
      --border: rgba(0, 212, 255, 0.12);
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Layout ── */
    .site {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 2rem 6rem;
    }

    /* ── City planning SVG symbols ── */
    .city-symbols {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeIn 0.9s 0.4s ease forwards;
    }
    .city-symbol {
      opacity: 0.18;
      color: var(--cyan);
      transition: opacity 0.3s;
    }
    .city-symbol:hover { opacity: 0.55; }
    .city-symbol svg { width: 38px; height: 38px; fill: none; stroke: currentColor; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Hero ── */
    .hero { text-align: center; max-width: 780px; }

    .name-wrap { overflow: hidden; margin-bottom: 0.25rem; }

    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      display: block;
      transform: translateY(110%);
      animation: slideUp 0.9s 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .name .first { color: var(--blue); }
    .name .last  { color: var(--white); }

    .tagline-wrap { overflow: hidden; margin-top: 1.25rem; }
    .tagline {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      transform: translateY(110%);
      animation: slideUp 0.9s 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .tagline strong { color: var(--white); font-weight: 500; }

    /* ── Social dock — centred in page ── */
    .social-dock {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: rgba(12, 18, 38, 0.7);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeIn 0.8s 0.9s ease forwards;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid transparent;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, transform 0.2s ease;
      position: relative;
    }
    .social-link svg { width: 20px; height: 20px; fill: currentColor; }

    .social-link[data-brand="instagram"]:hover { color: #E1306C; border-color: #E1306C; background: rgba(225,48,108,0.1); }
    .social-link[data-brand="tiktok"]:hover    { color: #69C9D0; border-color: #69C9D0; background: rgba(105,201,208,0.1); }
    .social-link[data-brand="snapchat"]:hover  { color: #FFFC00; border-color: #FFFC00; background: rgba(255,252,0,0.1); }
    .social-link[data-brand="whatsapp"]:hover  { color: #25D366; border-color: #25D366; background: rgba(37,211,102,0.1); }
    .social-link[data-brand="telegram"]:hover  { color: #2AABEE; border-color: #2AABEE; background: rgba(42,171,238,0.1); }
    .social-link:hover { transform: translateY(-3px); }

    /* Tooltip */
    .social-link::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--slate);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .social-link:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

    .dock-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 0.8s 1.1s ease forwards;
      pointer-events: none;
    }
    footer .pin-icon { width: 1.2rem; height: 1.2rem; object-fit: contain; }
    footer span { color: var(--white); }

    /* ── Animations ── */
    @keyframes slideUp      { to { transform: translateY(0); } }
    @keyframes fadeSlideDown {
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Cursor ── */
    .cursor {
      position: fixed; width: 8px; height: 8px;
      background: var(--cyan); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s; mix-blend-mode: screen;
    }
    .cursor-ring {
      position: fixed; width: 32px; height: 32px;
      border: 1px solid rgba(0,212,255,0.5); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, opacity 0.3s;
    }

    @media (max-width: 480px) {
      .cursor, .cursor-ring { display: none; }
      .social-dock { gap: 0.3rem; padding: 0.65rem 0.9rem; }
      .social-link { width: 36px; height: 36px; }
      .city-symbols { gap: 1.5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }
  </style>
</head>

  <script>
    /* ── Blueprint canvas ── */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, tick = 0;

    function resize() {
      w = canvas.width  = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function drawGrid() {
      ctx.clearRect(0, 0, w, h);
      const STEP = 48;
      const pulse = 0.3 + 0.08 * Math.sin(tick * 0.008);

      ctx.strokeStyle = `rgba(0, 212, 255, ${pulse * 0.18})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let x = 0; x <= w; x += STEP) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
      for (let y = 0; y <= h; y += STEP) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
      ctx.stroke();

      ctx.strokeStyle = `rgba(0, 212, 255, ${pulse * 0.32})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let x = 0; x <= w; x += STEP * 4) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
      for (let y = 0; y <= h; y += STEP * 4) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
      ctx.stroke();

      ctx.strokeStyle = `rgba(0, 212, 255, ${pulse * 0.5})`;
      ctx.lineWidth = 0.8;
      [[48,48],[w-48,48],[48,h-48],[w-48,h-48]].forEach(([cx,cy]) => {
        ctx.beginPath();
        ctx.moveTo(cx-10,cy); ctx.lineTo(cx+10,cy);
        ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy+10);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI*2);
        ctx.stroke();
      });

      tick++;
      requestAnimationFrame(drawGrid);
    }
    drawGrid();

    /* ── Custom cursor ── */
    const cur  = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = -100, my = -100, rx = -100, ry = -100;

    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    (function animCursor() {
      cur.style.left = mx + 'px';  cur.style.top = my + 'px';
      rx += (mx - rx) * 0.12;     ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animCursor);
    })();

    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cur.style.transform  = 'translate(-50%,-50%) scale(2.5)';
        ring.style.transform = 'translate(-50%,-50%) scale(0.5)';
        ring.style.opacity   = '0.3';
      });
      el.addEventListener('mouseleave', () => {
        cur.style.transform  = 'translate(-50%,-50%) scale(1)';
        ring.style.transform = 'translate(-50%,-50%) scale(1)';
        ring.style.opacity   = '1';
      });
    });
  </script>
